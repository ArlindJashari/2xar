<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/brand.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>North Macedonia welcomes new highway - 2XAR | Construction & Infrastructure</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <!-- Navigation Top Bar -->
    <header class="top-bar light-nav">
        <div class="container top-bar-inner">
            <div class="brand-logo">
                <a href="/">
                    <img src="/images/brand.svg" alt="2XAR Logo" class="brand-svg">
                </a>
            </div>
            <nav class="hero-nav">
                <a href="/">Home</a>
                <a href="/about">About 2xAR</a>
                <a href="/what-we-do">What We Do</a>
                <a href="/projects">Projects</a>
                <a href="/careers">Careers</a>
                <a href="/news">News</a>
                <a href="/contact">Contact</a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <i class="ph ph-list"></i>
            </button>

            <div class="mobile-menu-overlay">
                <div class="mobile-menu-header">
                    <div class="brand-logo item-nav">
                        <a href="/">
                            <img src="/images/brand.svg" alt="2XAR Logo" class="brand-svg">
                        </a>
                    </div>
                    <button class="close-menu" aria-label="Close Menu"><i class="ph ph-x"></i></button>
                </div>
                <nav class="mobile-nav-links">
                    <a href="/">Home</a>
                    <a href="/about">About 2xAR</a>
                    <a href="/what-we-do">What We Do</a>
                    <a href="/projects">Projects</a>
                    <a href="/careers">Careers</a>
                    <a href="/news">News</a>
                    <a href="/contact">Contact</a>
                </nav>
            </div>

        </div>
    </header>

    <main>
        <div id="project-detail-container">
            <!-- Project content will be loaded dynamically here -->
            <p style="text-align:center; padding: 100px;">Loading project...</p>
        </div>

    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <img src="/images/brand.svg" alt="2XAR Logo" class="footer-logo">
            </div>
            <div class="footer-info">
                <p>Ilir Durmishi str. 2, floor 3, no. 11, 10000 Prishtina, Kosovo</p>
                <p>E: info@2xar.global | W: www.2xar.global</p>
            </div>
            <div class="footer-social">
                <a href="#"><i class="ph-fill ph-instagram-logo"></i></a>
                <a href="#"><i class="ph-fill ph-linkedin-logo"></i></a>
            </div>
            <p class="copyright">&copy; 2026 2XAR. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const container = document.getElementById('project-detail-container');
            
            if (!slug) {
                container.innerHTML = '<p style="text-align:center; padding: 100px;">Project not found.</p>';
                return;
            }
            
            try {
                const res = await fetch(`/api/public/projects?slug=${encodeURIComponent(slug)}`);
                if (!res.ok) throw new Error('Failed to load project');
                const project = await res.json();
                
                if (!project) {
                    container.innerHTML = '<p style="text-align:center; padding: 100px;">Project not found.</p>';
                    return;
                }
                
                document.title = `${project.title} - 2XAR`;
                
                let galleryHtml = '';
                if (project.gallery && project.gallery.length > 0) {
                    const galleryItems = project.gallery.map(img => `
                        <div class="gallery-item">
                            <img src="${img}" alt="${project.title} Image">
                        </div>
                    `).join('');
                    galleryHtml = `
                    <div class="container" style="margin-top: 30px;">
                        <div class="gallery-grid">
                            ${galleryItems}
                        </div>
                    </div>`;
                }

                container.innerHTML = `
                    <section class="page-header">
                        <div class="container">
                            <div class="page-header-inner">
                                <h1 class="page-title">${project.title}</h1>
                                <div class="page-subtitle">${project.category || 'Project'} <br> ${(project.project_type || '').replace('-', ' ').toUpperCase()} | ${(project.country || '').toUpperCase()}</div>
                            </div>
                        </div>
                    </section>

                    <section class="project-intro-section">
                        <div class="container">
                            <div class="project-intro-grid">
                                <div class="project-meta-col">
                                    <div class="meta-item">
                                        <div class="meta-icon-row"><i class="ph-fill ph-map-pin"></i><span class="gold-label">Location</span></div>
                                        <p>${project.location || project.country || 'N/A'}</p>
                                    </div>
                                    <div class="meta-item">
                                        <div class="meta-icon-row"><i class="ph-fill ph-calendar-check"></i><span class="gold-label">Status</span></div>
                                        <p>${project.status || 'Active'}</p>
                                    </div>
                                    <div class="meta-item">
                                        <div class="meta-icon-row"><i class="ph-fill ph-ruler"></i><span class="gold-label">Scale</span></div>
                                        <p>${project.scale || 'N/A'}</p>
                                    </div>
                                    <div class="meta-item">
                                        <div class="meta-icon-row"><i class="ph-fill ph-briefcase"></i><span class="gold-label">Client</span></div>
                                        <p>${project.client || 'N/A'}</p>
                                    </div>
                                </div>
                                <div class="project-description-col">
                                    <h2 class="display-title small">${project.description || 'Project Overview'}</h2>
                                    <div class="lead-text">${project.full_content || ''}</div>

                                    ${(project.spec_steel || project.spec_concrete || project.spec_incidents) ? `
                                    <div class="technical-specs-box">
                                        ${project.spec_steel ? `<div class="spec"><span class="spec-val">${project.spec_steel}</span><span class="spec-label">TONS OF STEEL</span></div>` : ''}
                                        ${project.spec_concrete ? `<div class="spec"><span class="spec-val">${project.spec_concrete}</span><span class="spec-label">m³ CONCRETE</span></div>` : ''}
                                        ${project.spec_incidents ? `<div class="spec"><span class="spec-val">${project.spec_incidents}</span><span class="spec-label">SAFETY INCIDENTS</span></div>` : ''}
                                    </div>` : ''}
                                </div>
                            </div>
                        </div>
                    </section>

                    <section class="project-gallery">
                        ${project.image ? `
                        <div class="gallery-full-img">
                            <img src="${project.image}" alt="${project.title} Overview">
                        </div>` : ''}
                        ${galleryHtml}
                    </section>
                    
                    <section class="next-project-section">
                        <a href="/projects" class="next-project-link">
                            <span class="gold-label">Back</span>
                            <h2 class="display-title small">View All Projects &rarr;</h2>
                        </a>
                    </section>
                `;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="text-align:center; padding: 100px;">Error loading project.</p>';
            }
        });
    </script>
</body>

</html>
