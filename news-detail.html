<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/brand.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Detail - 2XAR | Construction & Infrastructure</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .article-hero {
            padding-top: 160px;
            padding-bottom: 80px;
            background: #fafafa;
        }

        .article-meta {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 30px;
        }

        .article-category {
            background: var(--color-accent);
            color: #000;
            padding: 4px 12px;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .article-date {
            font-size: 0.85rem;
            color: #777;
            font-weight: 500;
        }

        .article-title {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            max-width: 900px;
            margin-bottom: 40px;
        }

        .article-featured-img {
            width: 100%;
            height: 600px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 80px;
        }

        .article-body-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        .article-content {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #333;
        }

        .article-content p {
            margin-bottom: 30px;
        }

        .article-content h2 {
            font-size: 2.2rem;
            font-weight: 800;
            margin: 60px 0 30px;
            color: #000;
        }

        .article-quote {
            font-size: 1.8rem;
            font-style: italic;
            color: var(--color-accent);
            border-left: 4px solid var(--color-accent);
            padding-left: 40px;
            margin: 60px 0;
            line-height: 1.4;
            font-weight: 300;
        }

        /* CMS rich text uses <blockquote> — match pull-quote styling from live */
        .article-content blockquote {
            font-size: 1.8rem;
            font-style: italic;
            color: var(--color-accent);
            border-left: 4px solid var(--color-accent);
            padding-left: 40px;
            margin: 60px 0;
            line-height: 1.4;
            font-weight: 300;
            quotes: none;
        }

        .article-content blockquote p {
            margin-bottom: 0;
        }

        .article-footer {
            background: #000;
            margin-top: 100px;
            padding: 60px 0;
            color: #fff;
        }

        .article-footer .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-link a {
            color: var(--color-accent);
            text-decoration: none;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: transform 0.3s ease;
        }

        .back-link a:hover {
            transform: translateX(-5px);
        }

        .share-label {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #fff;
            margin-right: 30px;
            opacity: 0.8;
        }

        .share-links {
            display: flex;
            gap: 25px;
            align-items: center;
        }

        .share-links a {
            font-size: 1.4rem;
            color: #fff;
            opacity: 0.6;
            transition: all 0.3s ease;
        }

        .share-links a:hover {
            color: var(--color-accent);
            opacity: 1;
            transform: translateY(-3px);
        }

        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }

            .article-featured-img {
                height: 250px;
            }

            .article-content blockquote {
                font-size: 1.2rem !important;
                padding-left: 20px !important;
                margin: 40px 0 !important;
            }

            .article-footer .container {
                flex-direction: column;
                gap: 25px;
                align-items: flex-start;
            }

            .share-links {
                flex-wrap: wrap;
                gap: 15px;
            }

            .share-label {
                margin-right: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="page-news-detail">
    <!-- Navigation Top Bar -->
    <header class="top-bar light-nav">
        <div class="container top-bar-inner">
            <div class="brand-logo">
                <a href="/">
                    <img src="/images/brand.svg" alt="2XAR Logo" class="brand-svg">
                </a>
            </div>
            <nav class="hero-nav">
                <a href="/">Home</a>
                <a href="/about">About 2xAR</a>
                <a href="/what-we-do">What We Do</a>
                <a href="/projects">Projects</a>
                <a href="/careers">Careers</a>
                <a href="/news">News</a>
                <a href="/contact">Contact</a>
            </nav>
            <button class="menu-toggle" aria-label="Toggle Menu">
                <i class="ph ph-list"></i>
            </button>

            <div class="mobile-menu-overlay">
                <div class="mobile-menu-header">
                    <div class="brand-logo item-nav">
                        <a href="/">
                            <img src="/images/brand.svg" alt="2XAR Logo" class="brand-svg">
                        </a>
                    </div>
                    <button class="close-menu" aria-label="Close Menu"><i class="ph ph-x"></i></button>
                </div>
                <nav class="mobile-nav-links">
                    <a href="/">Home</a>
                    <a href="/about">About 2xAR</a>
                    <a href="/what-we-do">What We Do</a>
                    <a href="/projects">Projects</a>
                    <a href="/careers">Careers</a>
                    <a href="/news">News</a>
                    <a href="/contact">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main>
        <div id="news-detail-container">
            <p style="text-align:center; padding: 100px;">Loading article...</p>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <div class="footer-brand">
                <img src="/images/brand.svg" alt="2XAR Logo" class="footer-logo">
            </div>
            <div class="footer-info">
                <p>Ilir Durmishi str. 2, floor 3, no. 11, 10000 Prishtina, Kosovo</p>
                <p>E: info@2xar.global | W: www.2xar.global</p>
            </div>
            <div class="footer-social">
                <a href="#"><i class="ph-fill ph-instagram-logo"></i></a>
                <a href="#"><i class="ph-fill ph-linkedin-logo"></i></a>
            </div>
            <p class="copyright">&copy; 2026 2XAR. All rights reserved.</p>
        </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            const container = document.getElementById('news-detail-container');
            
            if (!slug) {
                container.innerHTML = '<p style="text-align:center; padding: 100px;">Article not found.</p>';
                return;
            }
            
            try {
                // Fetch the article
                const res = await fetch(`/api/public/news?slug=${encodeURIComponent(slug)}`);
                if (!res.ok) throw new Error('Failed to load news');
                const article = await res.json();
                
                if (!article) {
                    container.innerHTML = '<p style="text-align:center; padding: 100px;">Article not found.</p>';
                    return;
                }
                
                document.title = `${article.title} - 2XAR News`;

                const dateStr = article.date ? new Date(article.date).toLocaleDateString('en-US', {
                    year: 'numeric', month: 'long', day: 'numeric'
                }) : '';

                // Also fetch related news
                const allRes = await fetch('/api/public/news');
                let relatedHtml = '';
                if (allRes.ok) {
                    let allNews = await allRes.json();
                    let related = allNews.filter(n => n.slug !== slug).slice(0, 3);
                    if (related.length > 0) {
                        relatedHtml = `
                        <section class="related-news-section" style="padding: 120px 0; border-top: 1px solid #eee; margin-top: 80px;">
                            <div class="container">
                                <h2 class="about-title" style="font-size: 2.5rem; margin-bottom: 60px;">Related <span class="gold-text">Updates</span></h2>
                                <div class="news-grid" style="margin-top: 0;">
                                    ${related.map(r => `
                                        <article class="news-card">
                                            ${r.image ? `<img src="${r.image}" class="news-card-img" alt="${r.title}">` : ''}
                                            <div class="news-card-content">
                                                <span class="news-date">${r.date ? new Date(r.date).toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'}) : ''}</span>
                                                <h3>${r.title}</h3>
                                                <a href="/news-detail.html?slug=${r.slug}" class="project-link stretched-link">Read Full Article &rarr;</a>
                                            </div>
                                        </article>
                                    `).join('')}
                                </div>
                            </div>
                        </section>`;
                    }
                }

                // Render gallery if available
                let galleryHtml = '';
                if (article.gallery && article.gallery.length > 0) {
                    galleryHtml = `
                    <div class="container" style="margin-top: 40px; margin-bottom: 40px;">
                        <div class="gallery-grid" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px;">
                            ${article.gallery.map(img => `<img src="${img}" style="width:100%; height:200px; object-fit:cover; border-radius:4px;" alt="Gallery Image">`).join('')}
                        </div>
                    </div>`;
                }

                container.innerHTML = `
                    <article class="article-hero">
                        <div class="container">
                            <div class="article-meta">
                                <span class="article-category">${article.location || 'News'}</span>
                                <span class="article-date">${dateStr}</span>
                            </div>
                            <h1 class="article-title">${article.title}</h1>
                        </div>
                    </article>

                    <div class="container">
                        ${article.image ? `<img src="${article.image}" alt="${article.title}" class="article-featured-img">` : ''}

                        <div class="article-body-wrapper">
                            <div class="article-content">
                                ${article.content || article.excerpt || ''}
                            </div>
                        </div>
                    </div>

                    ${galleryHtml}

                    <footer class="article-footer">
                        <div class="container">
                            <div class="back-link">
                                <a href="/news">&larr; Back to News</a>
                            </div>
                            <div class="share-links">
                                <span class="share-label">Share Article</span>
                                <a href="#" title="Share on LinkedIn"><i class="ph ph-linkedin-logo"></i></a>
                                <a href="#" title="Share on Twitter"><i class="ph ph-twitter-logo"></i></a>
                                <a href="#" title="Copy Link" onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied!'); return false;"><i class="ph ph-link"></i></a>
                            </div>
                        </div>
                    </footer>

                    ${relatedHtml}
                `;
            } catch (err) {
                console.error(err);
                container.innerHTML = '<p style="text-align:center; padding: 100px;">Error loading article.</p>';
            }
        });
    </script>
</body>

</html>
